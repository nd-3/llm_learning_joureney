name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  techdoc-qa-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_portfolio/techdoc-qa-bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

  skill-match-analyzer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_portfolio/skill-match-analyzer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v
